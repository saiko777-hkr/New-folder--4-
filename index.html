<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>صفحة تيليجرام</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <!-- small paper-plane logo -->
      <svg class="logo" width="36" height="36" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M22 2L11 13" stroke="#2dd4bf" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M22 2L15 22L11 13L2 9L22 2Z" fill="rgba(45,212,191,0.06)" stroke="#0ee6c3" stroke-width="0.6"/>
      </svg>
      <h1 class="site-title">𝐒 𝐊 - 𝐁 𝐑 𝐀 𝐙 𝐈 𝐋 𝐘</h1>
    </div>

    <!-- dynamic search bar under the title -->
    <div class="search-bar">
      <input id="searchInput" type="search" placeholder="ابحث عن زر أو أداة..." aria-label="ابحث" />
    </div>
  </header>

  <!-- تم نقل محتوى الشريطين الجانبيين داخل لوحة القوائم لتفادي التكرار -->

  <main class="container">
    <section class="buttons-grid">
      <!-- 4 صفوف × 4 أزرار = 16 زرار (كل زر يحوي أيقونة ونص) -->
      <button class="btn" data-action="btn1" aria-label="زر 1"><span class="icon"> <!-- svg -->
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L19 21L12 17L5 21L12 2Z" fill="#2dd4bf"/></svg>
      </span><span class="label">زر 1</span></button>
      <button class="btn" data-action="btn2" aria-label="زر 2"><span class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="9" fill="#2dd4bf"/></svg></span><span class="label">زر 2</span></button>
      <button class="btn" data-action="btn3" aria-label="زر 3"><span class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="3" width="18" height="18" rx="3" fill="#2dd4bf"/></svg></span><span class="label">زر 3</span></button>
      <button class="btn" data-action="btn4" aria-label="زر 4"><span class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 12h18M12 3v18" stroke="#2dd4bf" stroke-width="1.6" stroke-linecap="round"/></svg></span><span class="label">زر 4</span></button>

      <button class="btn" data-action="btn5" aria-label="زر 5"><span class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L19 21L12 17L5 21L12 2Z" fill="#2dd4bf"/></svg></span><span class="label">زر 5</span></button>
      <button class="btn" data-action="btn6" aria-label="زر 6"><span class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="9" fill="#2dd4bf"/></svg></span><span class="label">زر 6</span></button>
      <button class="btn" data-action="btn7" aria-label="زر 7"><span class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="3" width="18" height="18" rx="3" fill="#2dd4bf"/></svg></span><span class="label">زر 7</span></button>
      <button class="btn" data-action="btn8" aria-label="زر 8"><span class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 12h18M12 3v18" stroke="#2dd4bf" stroke-width="1.6" stroke-linecap="round"/></svg></span><span class="label">زر 8</span></button>

      <button class="btn" data-action="btn9" aria-label="زر 9"><span class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L19 21L12 17L5 21L12 2Z" fill="#2dd4bf"/></svg></span><span class="label">زر 9</span></button>
      <button class="btn" data-action="btn10" aria-label="زر 10"><span class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="9" fill="#2dd4bf"/></svg></span><span class="label">زر 10</span></button>
      <button class="btn" data-action="btn11" aria-label="زر 11"><span class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="3" width="18" height="18" rx="3" fill="#2dd4bf"/></svg></span><span class="label">زر 11</span></button>
      <button class="btn" data-action="btn12" aria-label="زر 12"><span class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 12h18M12 3v18" stroke="#2dd4bf" stroke-width="1.6" stroke-linecap="round"/></svg></span><span class="label">زر 12</span></button>

      <button class="btn" data-action="btn13" aria-label="زر 13"><span class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L19 21L12 17L5 21L12 2Z" fill="#2dd4bf"/></svg></span><span class="label">زر 13</span></button>
      <button class="btn" data-action="btn14" aria-label="زر 14"><span class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="9" fill="#2dd4bf"/></svg></span><span class="label">زر 14</span></button>
      <button class="btn" data-action="btn15" aria-label="زر 15"><span class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="3" width="18" height="18" rx="3" fill="#2dd4bf"/></svg></span><span class="label">زر 15</span></button>
      <button class="btn" data-action="btn16" aria-label="زر 16"><span class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 12h18M12 3v18" stroke="#2dd4bf" stroke-width="1.6" stroke-linecap="round"/></svg></span><span class="label">زر 16</span></button>
    </section>

    <!-- Menu button (hamburger) and channel panel -->
    <button class="menu-btn" id="menuBtn" aria-label="قائمة">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>

    <!-- subtle overlay shown when menu opens -->
    <div id="overlay" class="overlay" aria-hidden="true"></div>

    <div class="channel-panel" id="channelPanel" aria-hidden="true">
      <h3>قناتي على تيليجرام</h3>
      <a href="#" id="joinChannel" class="btn-small">انضم الآن</a>
    </div>
  </main>

  <footer class="site-footer">
    <p>© جميع الحقوق محفوظة — [أدخل اسمك هنا]</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
